name: Gaming Bot Auto Post

on:
  schedule:
    # 5 Photo Posts (Memes/News)
    - cron: '0 4 * * *'   # 09:30 IST
    - cron: '0 8 * * *'   # 13:30 IST
    - cron: '0 11 * * *'  # 16:30 IST
    - cron: '0 13 * * *'  # 18:30 IST
    - cron: '0 17 * * *'  # 22:30 IST
    
    # 2 Reel Posts (2 PM & 9 PM IST)
    - cron: '30 8 * * *'  # 14:00 IST
    - cron: '30 15 * * *' # 21:00 IST
    
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # NAYA CHANGE 1: Write permission de rahe hain taaki JSON save ho sake
    permissions:
      contents: write 
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests Pillow moviepy
          sudo apt-get update && sudo apt-get install -y ffmpeg imagemagick

      - name: Run Bot
        env:
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python dispatcher.py

      # NAYA CHANGE 2: Updated topics.json ko wapas GitHub repo mein save karna
      - name: Commit and Push Updated JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add topics.json
          # Agar file change hui hai tabhi commit karo, warna error mat do
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update used topics [skip ci]" && git push)

name: Gaming Bot Auto Post
on:
  schedule:
    - cron: '0 8 * * *'   # 1:30 PM IST
    - cron: '0 13 * * *'  # 6:30 PM IST
    - cron: '0 17 * * *'  # 10:30 PM IST
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # YAHAN FIX HUA HAI: requests ke sath Pillow bhi install hoga
      - name: Install dependencies
        run: pip install requests Pillow

      - name: Run Bot
        env:
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python final_bot.py
